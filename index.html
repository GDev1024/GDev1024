:root{

*{

}
body{

  color:var(--neon);

/* CRT scanline overlay */
body::after{
  content:"";
  display:block;
  position:fixed;
  top:0;left:0;
  width:100vw;height:100vh;
  background:repeating-linear-gradient(

    rgba(0,0,0,0.04),

    transparent 1px,
    transparent 2px
  );
  pointer-events:none;
  z-index:10;
}
/* CRT vignette */
body::before{
  content:"";
  display:block;
  position:fixed;
  top:0;left:0;
  width:100vw;height:100vh;
  background:radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.65) 100%);

.line{ margin:2px 0; }
.line.dim{ opacity:0.55; }
.line.bright{

.line.ascii{

.prompt-line{

  pointer-events:auto;

}
.prompt{

  white-space:nowrap;
  text-shadow:0 0 8px var(--neon);

input.prompt-input{
  background:transparent;
  border:none;
  outline:none;

  width:100%;
  font-family:var(--font);
  font-size:1rem;
  caret-color:transparent;
  text-shadow:0 0 6px var(--neon);
}
/* Blinking block cursor */
.cursor-block{
  display:inline-block;
  width:0.6em;height:1em;
  background:var(--neon);
  vertical-align:text-bottom;
  margin-left:1px;
  animation:blink 1.1s step-end infinite;

@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

::-webkit-scrollbar-thumb{background:var(--neon-dim);border-radius:3px;}

  background:rgba(0,255,102,0.95);
  box-shadow:0 0 14px 3px rgba(0,255,102,0.7);

a{color:var(--neon);text-decoration:none;text-shadow:0 0 6px var(--neon-dim);}

/* Loading bar */

// --------------------------------------------------
// Matrix Rain  (binary + hex nibbles + symbols)
// --------------------------------------------------
(function(){
  const c = document.getElementById("matrix");
  const ctx = c.getContext("2d");
  function resize(){
    c.width  = window.innerWidth;
    c.height = window.innerHeight;
  }
  resize();
  window.addEventListener("resize", resize);
  const chars = "01アイウエオカキクケコ0123456789ABCDEF#@%&+=-><";
  const font  = 15;
  let columns, drops;
  function init(){
    columns = Math.floor(c.width / font);
    drops   = new Array(columns).fill(0).map(()=>Math.floor(Math.random()*-50));
  }
  init();
  window.addEventListener("resize", init);
  function draw(){
    ctx.fillStyle = "rgba(0,0,0,0.20)";
    ctx.fillRect(0,0,c.width,c.height);
    ctx.font = font+"px monospace";
    for(let i=0;i<drops.length;i++){
      const text = chars[Math.floor(Math.random()*chars.length)];
      const y = drops[i]*font;
      // Head character
      ctx.fillStyle = "#66cc88";
      ctx.fillText(text, i*font, y);
      // Trail
      ctx.fillStyle = "#009944";
      ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*font, y - font);
      if(y > c.height && Math.random()>0.975) drops[i] = 0;
      drops[i]++;
    }
    setTimeout(()=>requestAnimationFrame(draw), 60);
  }
  draw();
})();

// --------------------------------------------------
// Terminal Engine
// --------------------------------------------------
const outputEl = document.getElementById("output");
const input    = document.getElementById("cmd");
const hintEl   = document.getElementById("hint");

function appendLine(text, cls=""){
  const div = document.createElement("div");
  div.className = "line" + (cls ? " "+cls : "");
  div.innerHTML = text;
  outputEl.appendChild(div);
  outputEl.scrollTop = outputEl.scrollHeight;
  return div;
}

function typeLine(text, speed=14, cls=""){
  const div = appendLine("", cls);
  return new Promise(resolve=>{
    if(speed === 0){ div.innerHTML = text; resolve(); return; }
    let i=0;
    function tick(){
      div.innerHTML = text.slice(0,i);
      outputEl.scrollTop = outputEl.scrollHeight;
      if(i < text.length){ i++; setTimeout(()=>requestAnimationFrame(tick), speed); }
      else resolve();
    }
    tick();
  });
}

async function printBlock(lines, speed, cls){
  for(const l of lines) await typeLine(l, speed, cls);
}

// Instant print (no typing animation) — used for bulk content
function printInstant(lines, cls=""){
  for(const l of lines) appendLine(l, cls);
}

// Animated loading bar
function loadingBar(label, durationMs=900){
  return new Promise(resolve=>{
    const total = 28;
    let filled  = 0;
    const div   = appendLine(label + " [" + " ".repeat(total) + "] 0%");
    const id = setInterval(()=>{
      filled++;
      const pct = Math.round((filled/total)*100);
      div.innerHTML = label + " [" +
        "█".repeat(filled) + " ".repeat(total-filled) +
        `] ${pct}%`;
      outputEl.scrollTop = outputEl.scrollHeight;
      if(filled >= total){ clearInterval(id); resolve(); }
    }, durationMs / total);
  });
}

const COMMANDS = ["help","about","skills","experience","education","certs","projects","contact","socials","whoami","ls","clear"];

function separator(){ appendLine("─".repeat(54), "dim"); }

async function runCommand(cmd){
  cmd = cmd.trim().toLowerCase();
  if(!cmd) return;

  switch(cmd){

    case "help":
    case "ls":

        "│  whoami      Quick identity card                     │",

        "└─────────────────────────────────────────────────────┘"

    case "whoami":
      printInstant([

        `  Handle : gdev`,
        `  Role   : ${profile.role}`,
        `  Origin : Grenada`,
        `  Focus  : Cloud · Networking · AI`,

      ]);
      break;

    case "about":
      printInstant(["╔══ About ═════════════════════════════════════════╗",""]);
      for(const l of profile.about) await typeLine("  " + l, 12);
      appendLine("");
      appendLine("╚═══════════════════════════════════════════════════╝","dim");
      break;

    case "skills":
      printInstant(["╔══ Tech Stack ════════════════════════════════════╗"]);
      for(const [cat, items] of Object.entries(profile.skills)){
        appendLine(`  <span style="opacity:.7">[${cat}]</span>`);
        appendLine("    " + items.join("  ·  "));
      }
      appendLine("╚═══════════════════════════════════════════════════╝","dim");
      break;

    case "experience":
      printInstant(["╔══ Experience ════════════════════════════════════╗",""]);
      for(const job of profile.experience){
        printInstant([
          `  ◆ ${job.title}`,
          `    ${job.org}`,
          `    ${job.period}`,
          `    ${job.type}`,
        ]);
        for(const d of job.duties) appendLine(`      • ${d}`);
        appendLine("");
      }
      appendLine("╚═══════════════════════════════════════════════════╝","dim");
      break;

    case "education":
      printInstant(["╔══ Education ═════════════════════════════════════╗",""]);
      for(const e of profile.education){
        printInstant([
          `  ◆ ${e.degree}`,
          `    ${e.school}`,
          `    ${e.period}`,
          `    Focus: ${e.focus}`,
        ]);
      }
      appendLine("╚═══════════════════════════════════════════════════╝","dim");
      break;

    case "certs":
      printInstant(["╔══ Certifications ════════════════════════════════╗",""]);
      for(const cert of profile.certs){
        const link = cert.url
          ? `<a href="${cert.url}" target="_blank">${cert.name}</a>`
          : cert.name;
        appendLine(`  [*] ${link}`);
        appendLine(`     ${cert.issuer}  ·  Issued ${cert.date}`);

      }
      appendLine("╚═══════════════════════════════════════════════════╝","dim");

    case "projects":

// --------------------------------------------------
// Command History
// --------------------------------------------------
const history = [];
let histIdx   = -1;

input.addEventListener("keydown", async e=>{

  if(e.key === "ArrowUp"){
    e.preventDefault();
    if(history.length === 0) return;
    histIdx = Math.min(histIdx+1, history.length-1);
    input.value = history[histIdx];
    setTimeout(()=>input.setSelectionRange(input.value.length, input.value.length),0);
    return;
  }
  if(e.key === "ArrowDown"){
    e.preventDefault();
    histIdx = Math.max(histIdx-1, -1);
    input.value = histIdx === -1 ? "" : history[histIdx];
    return;
  }

  // Tab autocomplete
  if(e.key === "Tab"){
    e.preventDefault();
    const partial = input.value.trim().toLowerCase();
    if(!partial) return;
    const matches = COMMANDS.filter(c=>c.startsWith(partial));
    if(matches.length === 1){
      input.value = matches[0];
      hintEl.textContent = "";
    } else if(matches.length > 1){
      hintEl.textContent = "  " + matches.join("   ");
    }
    return;
  }

  // Clear hint on any other key
  hintEl.textContent = "";

  if(e.key === "Enter"){
    const cmd = input.value.trim();
    if(cmd){
      history.unshift(cmd);
      histIdx = -1;
    }
    appendLine(`<span style="opacity:.55">gdev@terminal:~$</span> ${cmd}`);
    input.value = "";
    await runCommand(cmd);
  }
});

// Live autocomplete hint while typing
input.addEventListener("input", ()=>{
  const partial = input.value.trim().toLowerCase();
  if(!partial){ hintEl.textContent=""; return; }
  const matches = COMMANDS.filter(c=>c.startsWith(partial) && c !== partial);
  hintEl.textContent = matches.length ? "  " + matches.join("   ") : "";
});

// Keep focus on input when clicking output
outputEl.addEventListener("click", ()=> input.focus());
document.addEventListener("click", ()=> input.focus());

  printBanner();
  await typeLine(`  Type <span style="font-weight:bold">'help'</span> for available commands.`, 14);
  await typeLine("", 0);
  input.focus();
})();
